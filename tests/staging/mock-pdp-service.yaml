apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-pdp
  namespace: guard-v2-test
  labels:
    app: mock-pdp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-pdp
  template:
    metadata:
      labels:
        app: mock-pdp
    spec:
      containers:
        - name: mock-pdp
          image: akolomeetcacr.azurecr.io/mock-pdp:latest
          args:
            - --port=8080
            - --allow-rate=0.9
            - --min-latency=10
            - --max-latency=100
            - --verbose
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: mock-pdp
  namespace: guard-v2-test
spec:
  selector:
    app: mock-pdp
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 443
      targetPort: 8080
      name: https
